<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="#1a0f0d"/>
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.9"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#C94536" opacity="0.15"/>
  <circle cx="150" cy="530" r="150" fill="#C94536" opacity="0.1"/>

  <!-- Camera viewfinder icon -->
  <g transform="translate(80, 180)" opacity="0.95">
    <rect x="0" y="0" width="160" height="160" rx="20" fill="#C94536"/>
    <g fill="none" stroke="white" stroke-width="8" stroke-linecap="round">
      <!-- Top-left -->
      <path d="M40 52 Q40 40 52 40 L68 40"/>
      <path d="M40 52 L40 68"/>
      <!-- Top-right -->
      <path d="M120 52 Q120 40 108 40 L92 40"/>
      <path d="M120 52 L120 68"/>
      <!-- Bottom-left -->
      <path d="M40 108 Q40 120 52 120 L68 120"/>
      <path d="M40 108 L40 92"/>
      <!-- Bottom-right -->
      <path d="M120 108 Q120 120 108 120 L92 120"/>
      <path d="M120 108 L120 92"/>
    </g>
  </g>

  <!-- Title -->
  <text x="280" y="250" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white">
    Photo Portugal
  </text>

  <!-- Subtitle -->
  <text x="280" y="310" font-family="Arial, sans-serif" font-size="28" fill="#e8b4ae">
    Find Your Perfect Photographer in Portugal
  </text>

  <!-- Features row -->
  <g transform="translate(280, 370)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#C94536" opacity="0.3"/>
    <text x="90" y="26" font-family="Arial, sans-serif" font-size="16" fill="#f5d5d1" text-anchor="middle">23+ Locations</text>

    <rect x="200" y="0" width="200" height="40" rx="20" fill="#C94536" opacity="0.3"/>
    <text x="300" y="26" font-family="Arial, sans-serif" font-size="16" fill="#f5d5d1" text-anchor="middle">Verified Reviews</text>

    <rect x="420" y="0" width="200" height="40" rx="20" fill="#C94536" opacity="0.3"/>
    <text x="520" y="26" font-family="Arial, sans-serif" font-size="16" fill="#f5d5d1" text-anchor="middle">Instant Booking</text>
  </g>

  <!-- Domain -->
  <text x="280" y="480" font-family="Arial, sans-serif" font-size="22" fill="#a08078">
    photoportugal.com
  </text>

  <!-- Location pills at bottom -->
  <g transform="translate(80, 550)">
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#7a5a52">
      Lisbon · Porto · Algarve · Sintra · Madeira · Azores · Douro Valley · Cascais · and more
    </text>
  </g>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#2a1510"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </linearGradient>
  </defs>
</svg>
