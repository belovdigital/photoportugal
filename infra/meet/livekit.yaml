# LiveKit server for Photo Portugal video calls (meet.photoportugal.com).
# TLS terminates at the games-caddy-1 Caddy (see /opt/games/Caddyfile);
# this server listens plain ws/http on 7880, media goes direct via UDP.
port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: true
redis:
  address: 127.0.0.1:6379
# keys are injected via generate-config.sh from .env — do not put secrets here
room:
  auto_create: false
  empty_timeout: 300
  max_participants: 4
logging:
  level: info
