# Photo Portugal — Nginx config
# Place at: /etc/nginx/sites-available/photoportugal
# Symlink: ln -s /etc/nginx/sites-available/photoportugal /etc/nginx/sites-enabled/
# Test: nginx -t && systemctl reload nginx

# Cache zone for optimized images (100MB, inactive items evict after 30 days)
proxy_cache_path /var/cache/nginx/img levels=1:2 keys_zone=img_cache:10m max_size=500m inactive=30d;

server {
    listen 80;
    server_name photoportugal.com www.photoportugal.com;

    # Redirect HTTP → HTTPS (uncomment when SSL is set up)
    # return 301 https://$host$request_uri;

    # ─── Static uploads (served directly by nginx, no Node.js) ───
    location /uploads/ {
        alias /var/www/photoportugal/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Served-By "nginx-static";

        # Gzip doesn't help images, disable for this block
        gzip off;

        # CORS for image preloading
        add_header Access-Control-Allow-Origin "*";

        # Try file, 404 if missing
        try_files $uri =404;
    }

    # ─── Optimized images API (cached by nginx) ───
    location /api/img/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Nginx cache — store optimized images so repeat requests skip Node.js entirely
        proxy_cache img_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating;

        # Override cache headers from Next.js — nginx controls caching here
        proxy_ignore_headers Cache-Control Expires;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ─── Static assets (JS, CSS, fonts) ───
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Public static files ───
    location ~* \.(ico|svg|webp|png|jpg|jpeg|gif|woff2?|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ─── Everything else → Next.js ───
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Don't cache HTML pages (ISR handles its own caching)
        add_header Cache-Control "no-cache";
    }

    # ─── Gzip ───
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─── Security ───
    client_max_body_size 25M;
}
