<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #FAF8F5;
    font-family: 'Inter', sans-serif;
    color: #1F1A14;
    position: relative;
    overflow: hidden;
  }
  .stage {
    width: 100%;
    height: 100%;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  /* top accent stripe */
  .stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, #C94536 0%, #C94536 50%, #399367 50%, #399367 100%);
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-mark {
    width: 64px; height: 64px;
    background: #C94536;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 30px;
    box-shadow: 0 4px 16px rgba(201,69,54,0.25);
  }
  .brand-text {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 38px;
    color: #C94536;
    letter-spacing: -0.5px;
  }
  .main {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 78px;
    line-height: 1.04;
    letter-spacing: -1.5px;
    color: #1F1A14;
    max-width: 880px;
  }
  h1 em {
    font-style: italic;
    color: #C94536;
    font-weight: 900;
  }
  .subtitle {
    font-size: 26px;
    color: #5C544A;
    line-height: 1.4;
    max-width: 820px;
    font-weight: 400;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
  }
  .stats {
    display: flex;
    gap: 36px;
    align-items: center;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    color: #1F1A14;
    font-weight: 500;
  }
  .check {
    width: 28px; height: 28px;
    background: #399367;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 16px;
    font-weight: 700;
  }
  .url {
    font-size: 22px;
    font-weight: 600;
    color: #C94536;
    letter-spacing: 0.5px;
  }
  /* decorative warm dot pattern bottom-right */
  .deco {
    position: absolute;
    right: -120px;
    bottom: -120px;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(201,69,54,0.12) 0%, rgba(201,69,54,0) 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="stripe"></div>
<div class="deco"></div>
<div class="stage">

  <div class="header">
    <div class="logo-mark">⌖</div>
    <div class="brand-text">Photo Portugal</div>
  </div>

  <div class="main">
    <h1>Hand-picked photographers<br>across <em>Portugal</em></h1>
    <p class="subtitle">Lisbon · Porto · Algarve · Sintra · Madeira · 30+ locations.<br>Every photographer personally vetted. Verified reviews. Secure payment.</p>
  </div>

  <div class="footer">
    <div class="stats">
      <div class="stat"><div class="check">✓</div>From €120</div>
      <div class="stat"><div class="check">✓</div>25+ photographers</div>
      <div class="stat"><div class="check">✓</div>30+ locations</div>
    </div>
    <div class="url">photoportugal.com</div>
  </div>

</div>
</body>
</html>
